<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福敲门·暖心到家 — Demo 导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#E85D3A 0%,#F08060 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:600px;width:100%}
.logo{text-align:center;margin-bottom:40px}
.logo-icon{font-size:64px;margin-bottom:12px}
.logo h1{color:#fff;font-size:28px;font-weight:700;margin-bottom:8px}
.logo p{color:rgba(255,255,255,0.85);font-size:16px}
.cards{display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border-radius:16px;padding:24px;text-decoration:none;color:#2D2418;box-shadow:0 4px 20px rgba(0,0,0,0.1);transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.15)}
.card-header{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.card-icon{font-size:32px}
.card-title{font-size:18px;font-weight:600}
.card-badge{display:inline-block;background:#E85D3A;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:8px}
.card-desc{color:#8B7E6E;font-size:14px;line-height:1.5}
.footer{text-align:center;margin-top:40px;color:rgba(255,255,255,0.7);font-size:13px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">🚪</div>
    <h1>幸福敲门·暖心到家</h1>
    <p>农村探访关爱志愿服务数字化平台</p>
  </div>
  <div class="cards">
    <a class="card" href="index-v3.html">
      <div class="card-header">
        <span class="card-icon">📱</span>
        <span class="card-title">志愿者工作台 <span class="card-badge">v3 NEW</span></span>
      </div>
      <div class="card-desc">一看一问打卡 · 需求工单P1-P4 · 安全排查 · 时间银行 · 离线模式（手机端最佳）</div>
    </a>
    <a class="card" href="admin-v2.html">
      <div class="card-header">
        <span class="card-icon">🖥️</span>
        <span class="card-title">管理后台 <span class="card-badge">v2 NEW</span></span>
      </div>
      <div class="card-desc">四级组织管理 · 工单闭环 · 资金审计 · 物资管理 · 老人档案（PC端）</div>
    </a>
    <a class="card" href="dashboard-v2.html">
      <div class="card-header">
        <span class="card-icon">📊</span>
        <span class="card-title">数据大屏 <span class="card-badge">v2 NEW</span></span>
      </div>
      <div class="card-desc">十省联动地图 · 探访频次KPI · 工单闭环率 · 志愿者激励 · 资金监管</div>
    </a>
  </div>
  <div class="footer">
    <p>中国老龄事业发展基金会 · 北京厚普聚益科技有限公司</p>
    <p style="margin-top:6px">2026年6月</p>
  </div>
</div>
</body>
</html>
