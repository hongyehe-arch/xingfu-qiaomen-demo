<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
<title>上海市民政局 · 适老化多商城系统 Demo</title>
<style>
/* ===== 适老化设计规范 ===== */
:root {
  --font-xl: 24px;
  --font-lg: 20px;
  --font-md: 18px;
  --font-sm: 16px;
  --font-xs: 14px;
  --color-primary: #E60012;
  --color-primary-dark: #B3000E;
  --color-success: #2E7D32;
  --color-warning: #E65100;
  --color-info: #1565C0;
  --color-bg: #F5F5F5;
  --color-card: #FFFFFF;
  --color-text: #212121;
  --color-text-secondary: #616161;
  --color-border: #E0E0E0;
  --color-subsidy: #E60012;
  --color-bulk: #1565C0;
  --color-rental: #6A1B9A;
  --color-self-service: #2E7D32;
  --color-self-hardware: #E65100;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 12px;
  --transition: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  font-size: var(--font-md);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
}

/* ===== 顶部导航 ===== */
.header {
  background: linear-gradient(135deg, #C8102E, #E60012);
  color: white;
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header h1 { font-size: var(--font-xl); font-weight: 700; letter-spacing: 2px; }
.header .subtitle { font-size: var(--font-sm); opacity: 0.9; margin-top: 4px; }
.header .gov-badge {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 2px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 6px;
}

/* ===== 语音播报按钮 ===== */
.voice-btn {
  position: fixed;
  bottom: 100px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-primary);
  color: white;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(230,0,18,0.4);
  z-index: 200;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.voice-btn:active { transform: scale(0.9); }
.voice-btn.speaking { background: #FF6B35; animation: pulse 1s infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 16px rgba(230,0,18,0.4); }
  50% { box-shadow: 0 4px 24px rgba(230,0,18,0.7); }
}

/* ===== 商城Tab切换 ===== */
.mall-tabs {
  display: flex;
  overflow-x: auto;
  background: white;
  padding: 8px;
  gap: 6px;
  position: sticky;
  top: 108px;
  z-index: 99;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  -webkit-overflow-scrolling: touch;
}
.mall-tab {
  flex-shrink: 0;
  padding: 12px 18px;
  border-radius: 28px;
  border: 2px solid var(--color-border);
  background: white;
  font-size: var(--font-md);
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  color: var(--color-text);
}
.mall-tab.active {
  color: white;
  border-color: transparent;
  transform: scale(1.02);
}
.mall-tab.s-subsidy.active { background: var(--color-subsidy); }
.mall-tab.s-bulk.active { background: var(--color-bulk); }
.mall-tab.s-rental.active { background: var(--color-rental); }
.mall-tab.s-self-service.active { background: var(--color-self-service); }
.mall-tab.s-self-hardware.active { background: var(--color-self-hardware); }
.mall-tab .tab-icon { font-size: 22px; display: block; }
.mall-tab .tab-label { font-size: var(--font-sm); }

/* ===== 主内容区 ===== */
.main-content {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
}

/* ===== 补贴金额卡片 ===== */
.subsidy-card {
  background: linear-gradient(135deg, #FFF5F5, #FFEBEE);
  border: 2px solid var(--color-subsidy);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  text-align: center;
}
.subsidy-card .amount {
  font-size: 48px;
  font-weight: 800;
  color: var(--color-subsidy);
  line-height: 1.2;
}
.subsidy-card .label { font-size: var(--font-md); color: var(--color-text-secondary); margin-top: 4px; }
.subsidy-card .expiry { font-size: var(--font-sm); color: var(--color-warning); margin-top: 4px; }

.btn-claim-subsidy {
  display: block;
  width: 100%;
  padding: 18px;
  background: var(--color-subsidy);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: var(--font-xl);
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
  transition: var(--transition);
  letter-spacing: 2px;
}
.btn-claim-subsidy:active { transform: scale(0.97); opacity: 0.9; }
.btn-claim-subsidy:disabled { background: #CCC; cursor: not-allowed; }

/* ===== 商品卡片 ===== */
.section-title {
  font-size: var(--font-xl);
  font-weight: 700;
  margin: 20px 0 12px;
  padding-left: 12px;
  border-left: 4px solid var(--color-subsidy);
}
.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.product-card {
  background: var(--color-card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: var(--transition);
  border: 2px solid transparent;
}
.product-card:active { transform: scale(0.97); }
.product-card.selected { border-color: var(--color-subsidy); }
.product-card .product-icon { font-size: 48px; text-align: center; margin-bottom: 8px; }
.product-card .product-name { font-size: var(--font-md); font-weight: 700; margin-bottom: 8px; }
.product-card .product-price { font-size: var(--font-sm); color: var(--color-text-secondary); text-decoration: line-through; }
.product-card .product-subsidy { font-size: var(--font-lg); color: var(--color-subsidy); font-weight: 700; }
.product-card .product-tag {
  display: inline-block;
  background: #FFF0F0;
  color: var(--color-subsidy);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 4px;
}

/* ===== 订单状态机 ===== */
.order-status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  overflow-x: auto;
}
.order-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 60px;
  position: relative;
}
.order-step .step-dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--color-border);
  border: 3px solid white;
  box-shadow: 0 0 0 2px var(--color-border);
  z-index: 1;
}
.order-step.active .step-dot { background: var(--color-success); box-shadow: 0 0 0 2px var(--color-success); }
.order-step.current .step-dot { background: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary); animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 0 2px var(--color-primary); }
  50% { box-shadow: 0 0 0 6px rgba(230,0,18,0.3); }
}
.order-step .step-label { font-size: 11px; margin-top: 4px; color: var(--color-text-secondary); text-align: center; }
.order-step.active .step-label { color: var(--color-success); font-weight: 600; }
.order-step.current .step-label { color: var(--color-primary); font-weight: 600; }
.order-step .step-line {
  position: absolute;
  top: 10px;
  left: 50%;
  width: calc(100% - 20px);
  height: 3px;
  background: var(--color-border);
  z-index: 0;
}
.order-step:last-child .step-line { display: none; }
.order-step.active .step-line { background: var(--color-success); }

/* ===== 弹窗/模态框 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 440px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { font-size: var(--font-xl); margin-bottom: 16px; text-align: center; }
.modal .order-detail { font-size: var(--font-md); }
.modal .order-detail p { margin: 8px 0; padding: 8px 12px; background: #F5F5F5; border-radius: 8px; }

/* ===== 支付按钮 ===== */
.btn-pay {
  display: block;
  width: 100%;
  padding: 18px;
  background: var(--color-success);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: var(--font-xl);
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}
.btn-pay:active { transform: scale(0.97); }
.btn-pay:disabled { background: #CCC; }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 16px;
  background: white;
  color: var(--color-primary);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius);
  font-size: var(--font-md);
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: var(--transition);
}
.btn-secondary:active { background: #FFF0F0; }

/* ===== 认证流程 ===== */
.auth-step {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.auth-step.active { display: block; }
.auth-step .auth-icon { font-size: 80px; margin-bottom: 20px; }
.auth-step h2 { font-size: var(--font-xl); margin-bottom: 12px; }
.auth-step p { font-size: var(--font-md); color: var(--color-text-secondary); margin-bottom: 24px; }

.btn-auth {
  display: inline-block;
  padding: 16px 48px;
  background: var(--color-primary);
  color: white;
  border: none;
  border-radius: 40px;
  font-size: var(--font-xl);
  font-weight: 700;
  cursor: pointer;
}
.btn-auth:active { transform: scale(0.95); }

/* ===== Toast / 通知 ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 28px;
  border-radius: 40px;
  font-size: var(--font-md);
  font-weight: 600;
  z-index: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}
.toast.success { background: #E8F5E9; color: var(--color-success); }
.toast.error { background: #FFEBEE; color: var(--color-primary); }
.toast.info { background: #E3F2FD; color: var(--color-info); }

/* ===== 我的订单列表 ===== */
.order-card {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}
.order-card .order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.order-card .order-id { font-size: var(--font-sm); color: var(--color-text-secondary); }
.order-card .order-status {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: var(--font-sm);
  font-weight: 600;
}
.status-created { background: #FFF3E0; color: var(--color-warning); }
.status-paid { background: #E8F5E9; color: var(--color-success); }
.status-shipping { background: #E3F2FD; color: var(--color-info); }
.status-delivered { background: #E8F5E9; color: var(--color-success); }
.status-installing { background: #F3E5F5; color: var(--color-rental); }
.status-completed { background: #E8F5E9; color: var(--color-success); }
.status-cancelled { background: #FFEBEE; color: var(--color-primary); }
.status-returning { background: #FFF8E1; color: #F57F17; }
.status-refunded { background: #ECEFF1; color: #546E7A; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-text-secondary);
}
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }
.empty-state p { font-size: var(--font-md); }

/* ===== 适配小屏 ===== */
@media (max-width: 400px) {
  .product-grid { grid-template-columns: 1fr; }
  .mall-tab { padding: 10px 14px; font-size: var(--font-sm); }
}
</style>
</head>
<body>

<!-- 顶部 -->
<header class="header">
  <h1>🏛️ 适老化多商城</h1>
  <div class="subtitle">上海市民政局 · 养老服务数字化平台</div>
  <div class="gov-badge">🇨🇳 政府指定平台</div>
</header>

<!-- 商城Tab -->
<nav class="mall-tabs" id="mallTabs">
  <button class="mall-tab s-subsidy active" data-mall="subsidy" onclick="switchMall('subsidy')">
    <span class="tab-icon">🧧</span>
    <span class="tab-label">补贴商城</span>
  </button>
  <button class="mall-tab s-bulk" data-mall="bulk" onclick="switchMall('bulk')">
    <span class="tab-icon">📦</span>
    <span class="tab-label">集采商城</span>
  </button>
  <button class="mall-tab s-rental" data-mall="rental" onclick="switchMall('rental')">
    <span class="tab-icon">🔑</span>
    <span class="tab-label">租赁商城</span>
  </button>
  <button class="mall-tab s-self-service" data-mall="self-service" onclick="switchMall('self-service')">
    <span class="tab-icon">💆</span>
    <span class="tab-label">自费服务</span>
  </button>
  <button class="mall-tab s-self-hardware" data-mall="self-hardware" onclick="switchMall('self-hardware')">
    <span class="tab-icon">🛠️</span>
    <span class="tab-label">自费硬件</span>
  </button>
</nav>

<!-- 主内容 -->
<main class="main-content" id="mainContent"></main>

<!-- 语音播报按钮 -->
<button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="语音播报">🔊</button>

<!-- 认证弹窗 -->
<div class="modal-overlay" id="authModal">
  <div class="modal" id="authContent"></div>
</div>

<!-- 订单详情弹窗 -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" id="orderContent"></div>
</div>

<script>
// ====== 全局状态 ======
const STATE_KEY = 'elderly_mall_state';

function getState() {
  const raw = localStorage.getItem(STATE_KEY);
  return raw ? JSON.parse(raw) : defaultState();
}

function saveState(state) {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function defaultState() {
  return {
    authenticated: false,
    subsidyBalance: 0,
    subsidyClaimed: false,
    orders: [],
    currentMall: 'subsidy',
    voiceEnabled: true,
    earnedPoints: 0,
  };
}

let state = getState();
window.state = state; // for debugging

// ====== 数据定义 ======
const MALLS = {
  subsidy: { name: '补贴商城', color: '#E60012', icon: '🧧' },
  bulk: { name: '集采商城', color: '#1565C0', icon: '📦' },
  rental: { name: '租赁商城', color: '#6A1B9A', icon: '🔑' },
  'self-service': { name: '自费服务', color: '#2E7D32', icon: '💆' },
  'self-hardware': { name: '自费硬件', color: '#E65100', icon: '🛠️' },
};

const PRODUCTS = {
  subsidy: [
    { id: 's1', name: '智能电动轮椅', icon: '🦽', price: 5280, subsidy: 2000, finalPrice: 3280, tag: '补贴 ¥2000' },
    { id: 's2', name: '多功能护理床', icon: '🛏️', price: 8600, subsidy: 3000, finalPrice: 5600, tag: '补贴 ¥3000' },
    { id: 's3', name: '助听器（数字型）', icon: '🦻', price: 3200, subsidy: 1200, finalPrice: 2000, tag: '补贴 ¥1200' },
    { id: 's4', name: '防褥疮气垫床', icon: '🛌', price: 1800, subsidy: 800, finalPrice: 1000, tag: '补贴 ¥800' },
    { id: 's5', name: '便携式制氧机', icon: '💨', price: 4500, subsidy: 1500, finalPrice: 3000, tag: '补贴 ¥1500' },
    { id: 's6', name: '高靠背洗澡椅', icon: '🪑', price: 680, subsidy: 300, finalPrice: 380, tag: '补贴 ¥300' },
  ],
  bulk: [
    { id: 'b1', name: '社区轮椅（20台）', icon: '📦', price: 60000, finalPrice: 60000, tag: '社区集采' },
    { id: 'b2', name: '护理床套装（10套）', icon: '🏥', price: 86000, finalPrice: 86000, tag: '社区集采' },
    { id: 'b3', name: '康复训练器材包', icon: '🏋️', price: 35000, finalPrice: 35000, tag: '社区集采' },
    { id: 'b4', name: '无障碍扶手套装', icon: '🔩', price: 15000, finalPrice: 15000, tag: '批量安装' },
  ],
  rental: [
    { id: 'r1', name: '电动轮椅（月租）', icon: '🦽', price: 500, finalPrice: 500, tag: '¥500/月' },
    { id: 'r2', name: '护理床（季租）', icon: '🛏️', price: 1200, finalPrice: 1200, tag: '¥400/月' },
    { id: 'r3', name: '制氧机（月租）', icon: '💨', price: 350, finalPrice: 350, tag: '¥350/月' },
    { id: 'r4', name: '爬楼机（日租）', icon: '🏗️', price: 80, finalPrice: 80, tag: '¥80/天' },
  ],
  'self-service': [
    { id: 'ss1', name: '上门护理（单次）', icon: '👩‍⚕️', price: 200, finalPrice: 200, tag: '自费' },
    { id: 'ss2', name: '康复理疗（10次卡）', icon: '💪', price: 1500, finalPrice: 1500, tag: '自费' },
    { id: 'ss3', name: '居家清洁（2小时）', icon: '🧹', price: 120, finalPrice: 120, tag: '自费' },
    { id: 'ss4', name: '陪诊服务（半天）', icon: '🏥', price: 300, finalPrice: 300, tag: '自费' },
    { id: 'ss5', name: '营养配餐（月卡）', icon: '🍱', price: 900, finalPrice: 900, tag: '自费' },
    { id: 'ss6', name: '心理慰藉（单次）', icon: '💝', price: 150, finalPrice: 150, tag: '自费' },
  ],
  'self-hardware': [
    { id: 'sh1', name: '智能血压计', icon: '🩺', price: 299, finalPrice: 299, tag: '自费' },
    { id: 'sh2', name: '跌倒检测手环', icon: '⌚', price: 599, finalPrice: 599, tag: '自费' },
    { id: 'sh3', name: '智能药盒（提醒版）', icon: '💊', price: 199, finalPrice: 199, tag: '自费' },
    { id: 'sh4', name: '家用红外理疗仪', icon: '🔴', price: 399, finalPrice: 399, tag: '自费' },
    { id: 'sh5', name: '智能马桶盖', icon: '🚽', price: 1299, finalPrice: 1299, tag: '自费' },
    { id: 'sh6', name: '语音控制台灯', icon: '💡', price: 159, finalPrice: 159, tag: '自费' },
  ],
};

// ====== 订单状态机（9状态） ======
const ORDER_STATUS = {
  CREATED: { key: 'created', label: '待支付', cls: 'status-created', step: 0 },
  PAID: { key: 'paid', label: '已支付', cls: 'status-paid', step: 1 },
  SHIPPING: { key: 'shipping', label: '配送中', cls: 'status-shipping', step: 2 },
  DELIVERED: { key: 'delivered', label: '已送达', cls: 'status-delivered', step: 3 },
  INSTALLING: { key: 'installing', label: '安装中', cls: 'status-installing', step: 4 },
  COMPLETED: { key: 'completed', label: '已完成', cls: 'status-completed', step: 5 },
  CANCELLED: { key: 'cancelled', label: '已取消', cls: 'status-cancelled', step: -1 },
  RETURNING: { key: 'returning', label: '退货中', cls: 'status-returning', step: -2 },
  REFUNDED: { key: 'refunded', label: '已退款', cls: 'status-refunded', step: -3 },
};

const STATUS_FLOW = ['created', 'paid', 'shipping', 'delivered', 'installing', 'completed'];

// 状态转换规则
function canTransition(from, to) {
  const rules = {
    created: ['paid', 'cancelled'],
    paid: ['shipping', 'cancelled'],
    shipping: ['delivered'],
    delivered: ['installing'],
    installing: ['completed'],
    completed: ['returning'],
    returning: ['refunded'],
  };
  return (rules[from] || []).includes(to);
}

// ====== 语音播报 ======
function speak(text, force = false) {
  if (!state.voiceEnabled && !force) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.85;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;
    const voiceBtn = document.getElementById('voiceBtn');
    voiceBtn.classList.add('speaking');
    utterance.onend = () => voiceBtn.classList.remove('speaking');
    utterance.onerror = () => voiceBtn.classList.remove('speaking');
    window.speechSynthesis.speak(utterance);
  }
}

function toggleVoice() {
  state.voiceEnabled = !state.voiceEnabled;
  saveState(state);
  const btn = document.getElementById('voiceBtn');
  if (state.voiceEnabled) {
    btn.textContent = '🔊';
    speak('语音播报已开启');
  } else {
    btn.textContent = '🔇';
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
  }
  btn.setAttribute('title', state.voiceEnabled ? '语音播报已开启' : '语音播报已关闭');
}

// ====== Toast 通知 ======
function showToast(msg, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  if (type === 'success' || type === 'error') speak(msg);
  setTimeout(() => toast.remove(), 3000);
}

// ====== 认证流程 ======
function startAuth() {
  const modal = document.getElementById('authModal');
  const content = document.getElementById('authContent');
  modal.classList.add('show');
  
  let step = 0;
  const steps = [
    { icon: '📱', title: '第一步：身份认证', desc: '请授权微信登录以验证您的身份。\n\n这是政府指定的养老服务数字化平台，您的信息受法律保护，仅用于补贴资格核验。', btn: '授权微信登录' },
    { icon: '😊', title: '第二步：人脸识别', desc: '请正对屏幕，按提示完成人脸识别。\n\n语音引导：请看着屏幕眨一下眼睛。\n\n⚠️ 如果3次识别失败，可联系家人或社区工作人员协助。', btn: '开始人脸识别' },
    { icon: '✅', title: '认证完成！', desc: '恭喜！您的资格已认证通过。\n\n系统已自动完成以下核验：\n• 身份实名核验 ✓\n• 年龄/残疾等级判定 ✓\n• 低保/低收入认定 ✓\n• 长护险参保状态 ✓\n\n已为您开通补贴账户。', btn: '进入商城' },
  ];
  
  function renderStep() {
    const s = steps[step];
    content.innerHTML = `
      <div class="auth-step active">
        <div class="auth-icon">${s.icon}</div>
        <h2>${s.title}</h2>
        <p style="white-space:pre-line">${s.desc}</p>
        <button class="btn-auth" onclick="authStepNext(${step})">${s.btn}</button>
        ${step < 2 ? `<button class="btn-secondary" style="margin-top:12px" onclick="closeAuth()">稍后再说</button>` : ''}
      </div>
    `;
  }
  
  window.authStepNext = function(currentStep) {
    if (currentStep === 0) {
      // 模拟微信授权
      speak('正在授权微信登录...');
      step = 1;
      renderStep();
    } else if (currentStep === 1) {
      // 模拟人脸识别
      speak('请看着我眨一下眼睛', true);
      setTimeout(() => {
        step = 2;
        renderStep();
        speak('认证成功！已为您开通补贴账户');
      }, 2000);
    } else if (currentStep === 2) {
      state.authenticated = true;
      state.subsidyBalance = 800;
      saveState(state);
      closeAuth();
      renderMall(state.currentMall);
      showToast('🎉 认证成功！获得 ¥800 补贴额度', 'success');
    }
  };
  
  window.closeAuth = function() {
    document.getElementById('authModal').classList.remove('show');
  };
  
  renderStep();
}

// ====== 领取补贴券 ======
function claimSubsidy() {
  if (!state.authenticated) {
    startAuth();
    return;
  }
  if (state.subsidyClaimed) {
    showToast('本月补贴券已领取，请下月再来', 'info');
    return;
  }
  
  speak('正在领取补贴券...');
  
  setTimeout(() => {
    state.subsidyClaimed = true;
    state.subsidyBalance += 300;
    state.earnedPoints = (state.earnedPoints || 0) + 50;
    saveState(state);
    renderMall('subsidy');
    showToast('🎉 领取成功！¥300 补贴券已到账 + 获赠50积分', 'success');
  }, 800);
}

// ====== 购买商品 ======
function buyProduct(productId, mallName) {
  if (!state.authenticated && mallName === 'subsidy') {
    startAuth();
    return;
  }
  
  const product = PRODUCTS[mallName].find(p => p.id === productId);
  if (!product) return;
  
  const subsidyAmount = product.subsidy || 0;
  const needPay = product.finalPrice;
  const hasSubsidy = mallName === 'subsidy' && state.subsidyBalance > 0;
  
  // 补贴抵扣
  let actualPay = needPay;
  let subsidyUsed = 0;
  if (hasSubsidy) {
    subsidyUsed = Math.min(subsidyAmount, state.subsidyBalance, needPay);
    actualPay = needPay - subsidyUsed;
  }
  
  const orderId = 'ORD' + Date.now().toString(36).toUpperCase();
  const order = {
    id: orderId,
    productId: product.id,
    productName: product.name,
    productIcon: product.icon,
    mall: mallName,
    mallName: MALLS[mallName].name,
    status: 'created',
    price: needPay,
    subsidyUsed: subsidyUsed,
    actualPay: actualPay,
    createdAt: new Date().toISOString(),
    statusHistory: [{ status: 'created', time: new Date().toISOString() }],
  };
  
  // 弹窗确认
  const modal = document.getElementById('orderModal');
  const content = document.getElementById('orderContent');
  modal.classList.add('show');
  
  content.innerHTML = `
    <h2>📋 确认订单</h2>
    <div class="order-detail">
      <p>🏷️ 商品：<strong>${product.icon} ${product.name}</strong></p>
      <p>💰 原价：<strong>¥${needPay.toLocaleString()}</strong></p>
      ${hasSubsidy ? `<p>🧧 补贴抵扣：<strong style="color:#E60012">-¥${subsidyUsed.toLocaleString()}</strong></p>` : ''}
      <p style="font-size:24px;font-weight:800;color:#E60012;text-align:center;padding:12px;">
        应付：<strong>¥${actualPay.toLocaleString()}</strong>
      </p>
      ${hasSubsidy && actualPay === 0 ? '<p style="text-align:center;color:#2E7D32">🎉 补贴全额抵扣，无需额外支付！</p>' : ''}
    </div>
    <button class="btn-pay" style="margin-top:16px" onclick="confirmPay('${orderId}')">
      ${actualPay > 0 ? `💳 微信支付 ¥${actualPay.toLocaleString()}` : '✅ 确认下单'}
    </button>
    <button class="btn-secondary" onclick="closeOrderModal()">取消</button>
  `;
  
  window.pendingOrder = order;
  
  window.confirmPay = function(oid) {
    if (!window.pendingOrder || window.pendingOrder.id !== oid) return;
    const ord = window.pendingOrder;
    
    // 模拟支付
    speak('正在支付，请稍候...');
    
    setTimeout(() => {
      // 扣减补贴余额
      if (ord.subsidyUsed > 0) {
        state.subsidyBalance -= ord.subsidyUsed;
      }
      ord.status = 'paid';
      ord.statusHistory.push({ status: 'paid', time: new Date().toISOString() });
      
      // 补贴场景获赠积分
      if (ord.subsidyUsed > 0) {
        state.earnedPoints = (state.earnedPoints || 0) + Math.floor(ord.price / 10);
      }
      
      state.orders.unshift(ord);
      saveState(state);
      closeOrderModal();
      renderMall(state.currentMall);
      showToast('✅ 支付成功！订单 ' + ord.id + ' 已生成', 'success');
      
      // 自动推进物流状态（Demo用定时器模拟）
      scheduleOrderProgress(ord.id);
      
      window.pendingOrder = null;
    }, 1500);
  };
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('show');
  window.pendingOrder = null;
}

// ====== 模拟订单进度推进 ======
function scheduleOrderProgress(orderId) {
  const delays = [
    { after: 5000, status: 'shipping' },
    { after: 10000, status: 'delivered' },
    { after: 15000, status: 'installing' },
    { after: 20000, status: 'completed' },
  ];
  
  delays.forEach(({ after, status }) => {
    setTimeout(() => {
      const ord = state.orders.find(o => o.id === orderId);
      if (ord && canTransition(ord.status, status)) {
        ord.status = status;
        ord.statusHistory.push({ status, time: new Date().toISOString() });
        saveState(state);
        
        const statusObj = Object.values(ORDER_STATUS).find(s => s.key === status);
        if (status === 'shipping') {
          showToast('📦 您的订单已发货，物流配送中', 'info');
        } else if (status === 'delivered') {
          showToast('📍 商品已送达，等待安装', 'info');
        } else if (status === 'installing') {
          showToast('🔧 安装服务进行中', 'info');
        } else if (status === 'completed') {
          showToast('🎉 订单已完成！请对服务进行评价', 'success');
        }
        
        // 刷新当前页面如果显示订单
        if (state.currentMall === 'orders') renderOrders();
      }
    }, after);
  });
}

// ====== 页面渲染 ======
function renderMall(mallName) {
  state.currentMall = mallName;
  saveState(state);
  
  // 更新Tab状态
  document.querySelectorAll('.mall-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`.mall-tab[data-mall="${mallName}"]`);
  if (activeTab) activeTab.classList.add('active');
  
  const main = document.getElementById('mainContent');
  const mall = MALLS[mallName];
  const products = PRODUCTS[mallName];
  
  let html = '';
  
  // 补贴商城专属：认证状态 & 补贴券
  if (mallName === 'subsidy') {
    if (!state.authenticated) {
      html += `
        <div class="subsidy-card" style="text-align:center;padding:30px 20px">
          <div style="font-size:64px;margin-bottom:12px">🧧</div>
          <h2 style="font-size:var(--font-xl);margin-bottom:8px">政府补贴商城</h2>
          <p style="font-size:var(--font-md);color:var(--color-text-secondary);margin-bottom:20px">
            符合条件的老年人可享受政府补贴购买辅助器具
          </p>
          <button class="btn-auth" onclick="startAuth()">开始认证 →</button>
        </div>
      `;
    } else {
      html += `
        <div class="subsidy-card">
          <div class="label">可用补贴额度</div>
          <div class="amount">¥${state.subsidyBalance.toLocaleString()}</div>
          <div class="expiry">📅 有效期至 ${new Date(Date.now()+30*86400000).toLocaleDateString('zh-CN')}</div>
          ${state.subsidyClaimed 
            ? '<p style="color:var(--color-success);font-weight:600;margin-top:8px">✅ 本月已领取</p>'
            : `<button class="btn-claim-subsidy" onclick="claimSubsidy()">🧧 领取补贴券 ¥300</button>`
          }
          <p style="font-size:var(--font-xs);color:var(--color-text-secondary);margin-top:8px">
            🎁 领券即送50积分 · 积分可在自费商城抵扣
          </p>
        </div>
      `;
    }
  }
  
  // 商品列表
  html += `<h2 class="section-title">${mall.icon} ${mall.name}商品</h2>`;
  html += '<div class="product-grid">';
  
  products.forEach(p => {
    html += `
      <div class="product-card" onclick="buyProduct('${p.id}', '${mallName}')">
        <div class="product-icon">${p.icon}</div>
        <div class="product-name">${p.name}</div>
        ${p.subsidy ? `<div class="product-price">原价 ¥${p.price.toLocaleString()}</div>` : ''}
        <div class="product-subsidy">
          ${p.subsidy ? `补贴价 ¥${p.finalPrice.toLocaleString()}` : `¥${p.finalPrice.toLocaleString()}`}
        </div>
        ${p.tag ? `<span class="product-tag">${p.tag}</span>` : ''}
      </div>
    `;
  });
  
  html += '</div>';
  
  // 底部快捷入口
  html += `
    <div style="display:flex;gap:12px;margin-top:24px">
      <button class="btn-secondary" style="flex:1" onclick="showOrders()">📋 我的订单</button>
      <button class="btn-secondary" style="flex:1" onclick="showPoints()">⭐ 我的积分</button>
    </div>
  `;
  
  main.innerHTML = html;
  
  // 语音播报
  speak(`${mall.name}，共${products.length}款商品`, false);
}

// ====== 我的订单 ======
function showOrders() {
  state.currentMall = 'orders';
  saveState(state);
  
  document.querySelectorAll('.mall-tab').forEach(t => t.classList.remove('active'));
  
  const main = document.getElementById('mainContent');
  
  if (state.orders.length === 0) {
    main.innerHTML = `
      <h2 class="section-title">📋 我的订单</h2>
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>还没有订单</p>
        <p style="font-size:var(--font-sm);margin-top:4px">快去商城逛逛吧～</p>
      </div>
      <button class="btn-secondary" onclick="renderMall('${state.currentMall === 'orders' ? 'subsidy' : state.currentMall}')">← 返回商城</button>
    `;
    return;
  }
  
  let html = '<h2 class="section-title">📋 我的订单</h2>';
  
  state.orders.forEach(order => {
    const statusObj = Object.values(ORDER_STATUS).find(s => s.key === order.status) || ORDER_STATUS.CREATED;
    const flowSteps = ['created', 'paid', 'shipping', 'delivered', 'installing', 'completed'];
    const currentIdx = flowSteps.indexOf(order.status);
    
    html += `
      <div class="order-card" onclick="showOrderDetail('${order.id}')">
        <div class="order-header">
          <span class="order-id">📦 ${order.id}</span>
          <span class="order-status ${statusObj.cls}">${statusObj.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:36px">${order.productIcon}</span>
          <div>
            <div style="font-size:var(--font-md);font-weight:700">${order.productName}</div>
            <div style="font-size:var(--font-sm);color:var(--color-text-secondary)">
              ${order.mallName} · ¥${order.price.toLocaleString()}
              ${order.subsidyUsed > 0 ? `<span style="color:#E60012"> (补贴-¥${order.subsidyUsed})</span>` : ''}
            </div>
          </div>
        </div>
        ${currentIdx >= 0 ? `
        <div class="order-status-bar" style="margin-top:12px">
          ${flowSteps.map((s, i) => {
            const cls = i < currentIdx ? 'active' : (i === currentIdx ? 'current' : '');
            return `
              <div class="order-step ${cls}">
                <div class="step-dot"></div>
                <div class="step-label">${['待支付','已支付','配送中','已送达','安装中','已完成'][i]}</div>
                <div class="step-line"></div>
              </div>
            `;
          }).join('')}
        </div>
        ` : ''}
      </div>
    `;
  });
  
  html += '<button class="btn-secondary" style="margin-top:12px" onclick="renderMall(\'subsidy\')">← 返回商城</button>';
  main.innerHTML = html;
}

function showOrderDetail(orderId) {
  const order = state.orders.find(o => o.id === orderId);
  if (!order) return;
  
  const statusObj = Object.values(ORDER_STATUS).find(s => s.key === order.status) || ORDER_STATUS.CREATED;
  const modal = document.getElementById('orderModal');
  const content = document.getElementById('orderContent');
  modal.classList.add('show');
  
  content.innerHTML = `
    <h2>📋 订单详情</h2>
    <div class="order-detail">
      <p>📦 订单号：<strong>${order.id}</strong></p>
      <p>🏷️ 商品：<strong>${order.productIcon} ${order.productName}</strong></p>
      <p>🏪 商城：${order.mallName}</p>
      <p>💰 金额：¥${order.price.toLocaleString()}</p>
      ${order.subsidyUsed > 0 ? `<p>🧧 补贴抵扣：<strong style="color:#E60012">-¥${order.subsidyUsed.toLocaleString()}</strong></p>` : ''}
      <p>💳 实付：<strong>¥${order.actualPay.toLocaleString()}</strong></p>
      <p>📊 状态：<span class="order-status ${statusObj.cls}">${statusObj.label}</span></p>
      <p>🕐 下单时间：${new Date(order.createdAt).toLocaleString('zh-CN')}</p>
      <hr style="margin:12px 0">
      <p style="font-weight:700">状态记录：</p>
      ${order.statusHistory.map(h => `
        <p style="font-size:var(--font-sm)">→ ${new Date(h.time).toLocaleTimeString('zh-CN')} ${Object.values(ORDER_STATUS).find(s=>s.key===h.status)?.label || h.status}</p>
      `).join('')}
    </div>
    <button class="btn-pay" style="margin-top:16px" onclick="closeOrderModal()">关闭</button>
  `;
}

// ====== 积分页 ======
function showPoints() {
  const main = document.getElementById('mainContent');
  const points = state.earnedPoints || 0;
  
  main.innerHTML = `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:64px">⭐</div>
      <div style="font-size:56px;font-weight:800;color:#E65100;margin:12px 0">${points}</div>
      <div style="font-size:var(--font-md);color:var(--color-text-secondary)">我的积分</div>
      <p style="margin-top:16px;font-size:var(--font-sm);color:var(--color-text-secondary)">
        100积分 = ¥1 抵扣<br>
        积分获取：领补贴券+50 · 下单消费每¥10+1积分<br>
        自费商城3倍积分！
      </p>
    </div>
    <button class="btn-secondary" onclick="renderMall('${state.currentMall === 'orders' ? 'subsidy' : state.currentMall}')">← 返回商城</button>
  `;
}

// ====== 商城切换 ======
function switchMall(mallName) {
  renderMall(mallName);
}

document.addEventListener('DOMContentLoaded', () => {
  renderMall(state.currentMall);

  const voiceBtn = document.getElementById('voiceBtn');
  if (!state.voiceEnabled) {
    voiceBtn.textContent = '🔇';
    voiceBtn.setAttribute('title', '语音播报已关闭');
  }
});

document.getElementById('authModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
